name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m py_compile app.py fea_engine/*.py templates/*.py tests/*.py

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  docker-smoke:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify Docker runtime
        run: docker version

      - name: Pull DOLFINx image
        run: docker pull dolfinx/dolfinx:v0.7.3

      - name: Run Docker smoke test
        env:
          RUN_DOCKER_SMOKE: "1"
        run: PYTHONPATH=. pytest -q tests/test_integration_docker_smoke.py --run-docker-smoke
